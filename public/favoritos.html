<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meus álbuns favoritos — VinylVault">
  <title>Favoritos | VinylVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo" aria-label="VinylVault — início">
        <div class="site-logo__icon" aria-hidden="true">♪</div>
        <span class="site-logo__text">Vinyl<span>Vault</span></span>
      </a>

      <button class="hamburger" id="btn-hamburger" aria-label="Abrir menu" aria-expanded="false">☰</button>

      <nav class="site-nav" id="site-nav" aria-label="Navegação principal">
        <a href="index.html" class="nav-link">Início</a>
        <a href="index.html#todos-discos" class="nav-link">Coleção</a>
        <a href="cadastro_disco.html" class="nav-link" id="nav-gerenciar" hidden>Gerenciar</a>
        <a href="favoritos.html" class="nav-link active" id="nav-favoritos" hidden>Favoritos</a>
        <a href="index.html#sobre" class="nav-link">Sobre</a>
        <a href="login.html" class="nav-link" id="nav-login">Login</a>
        <a href="#" class="nav-link" id="nav-logout" hidden>Logout</a>
      </nav>

      <form class="search-form" role="search" aria-label="Buscar álbuns"
            onsubmit="event.preventDefault(); const q=this.querySelector('input').value; if(q) window.location='index.html?busca='+encodeURIComponent(q);">
        <input type="search" placeholder="Buscar álbum..." aria-label="Buscar" autocomplete="off">
        <button type="submit" aria-label="Pesquisar">Buscar</button>
      </form>
    </div>
  </header>

  <main id="conteudo-principal">
    <section class="container py-5" aria-label="Álbuns favoritos">

      <div class="section-header">
        <h1 class="section-title">Meus Favoritos</h1>
        <span class="section-count" id="total-favoritos" aria-live="polite"></span>
      </div>

      <p class="section-desc mb-4">Álbuns que você marcou como favoritos na coleção.</p>

      <div class="row g-4" id="favoritos-grid" aria-label="Lista de favoritos">
        <div class="col-12 text-center py-5">
          <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <span>Carregando favoritos...</span>
          </div>
        </div>
      </div>

    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p class="footer-logo">♪ VinylVault</p>
      <p class="footer-copy">&copy; 2025 VinylVault · Projeto acadêmico — PUC Minas</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    const btnHamb = document.getElementById('btn-hamburger');
    const nav = document.getElementById('site-nav');
    btnHamb?.addEventListener('click', () => {
      nav.classList.toggle('nav-open');
      const open = nav.classList.contains('nav-open');
      btnHamb.setAttribute('aria-expanded', open);
      btnHamb.textContent = open ? '✕' : '☰';
    });
  </script>
</body>
</html>
