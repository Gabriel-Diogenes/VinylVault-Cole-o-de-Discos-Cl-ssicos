<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:type" content="music.album">
  <meta name="description" content="Detalhes do álbum — VinylVault">

  <title>Detalhes do Álbum | VinylVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container">

      <a href="index.html" class="site-logo" aria-label="VinylVault — início">
        <div class="site-logo__icon" aria-hidden="true">🎵</div>
        <span class="site-logo__text">Vinyl<span>Vault</span></span>
      </a>

      <button class="hamburger" id="btn-hamburger" aria-label="Abrir menu" aria-expanded="false">☰</button>

      <nav class="site-nav" id="site-nav" aria-label="Navegação principal">
        <a href="index.html" class="nav-link">Início</a>
        <a href="index.html#todos-discos" class="nav-link">Coleção</a>
        <a href="index.html#sobre" class="nav-link">Sobre</a>
      </nav>

      <form class="search-form" role="search" aria-label="Buscar álbuns"
            onsubmit="event.preventDefault(); const q=this.querySelector('input').value; if(q) window.location='index.html?busca='+encodeURIComponent(q);">
        <input type="search" placeholder="Buscar álbum..." aria-label="Buscar" autocomplete="off">
        <button type="submit" aria-label="Pesquisar">🔍</button>
      </form>

    </div>
  </header>

  <main id="conteudo-principal">

    <section class="page-hero" aria-label="Informações gerais do álbum">
      <div class="container">

        <nav aria-label="Caminho de navegação" class="mb-4">
          <ol class="breadcrumb" style="background:none; padding:0; margin:0; font-size:0.8rem; color:var(--color-text-muted);">
            <li class="breadcrumb-item">
              <a href="index.html" style="color:var(--color-text-muted);">Início</a>
            </li>
            <li class="breadcrumb-item">
              <a href="index.html#todos-discos" style="color:var(--color-text-muted);">Coleção</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page" style="color:var(--color-accent);" id="breadcrumb-titulo">
              Detalhes
            </li>
          </ol>
        </nav>

        <div id="detalhe-info">
          <div class="loading-spinner py-5">
            <div class="spinner-ring"></div>
            <span>Carregando informações do álbum...</span>
          </div>
        </div>

      </div>
    </section>

    <section id="faixas-section" class="container py-5" aria-label="Faixas do álbum">

      <h2 class="faixas-titulo">Faixas</h2>

      <div class="row g-4" id="faixas-row" aria-label="Lista de faixas">
        <div class="col-12 text-center py-4">
          <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <span>Carregando faixas...</span>
          </div>
        </div>
      </div>

    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p class="footer-logo"> VinylVault</p>
      <p class="footer-copy">
        &copy; 2025 VinylVault · Projeto acadêmico — PUC Minas · Ciência da Computação
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="assets/js/app.js"></script>

  <script>
    const btnHamb = document.getElementById('btn-hamburger');
    const nav = document.getElementById('site-nav');
    btnHamb?.addEventListener('click', () => {
      nav.classList.toggle('nav-open');
      const open = nav.classList.contains('nav-open');
      btnHamb.setAttribute('aria-expanded', open);
      btnHamb.textContent = open ? '✕' : '☰';
    });

    const detalheObs = new MutationObserver(() => {
      const h1 = document.querySelector('.detalhe-titulo');
      const bc = document.getElementById('breadcrumb-titulo');
      if (h1 && bc && h1.textContent) {
        bc.textContent = h1.textContent;
        detalheObs.disconnect();
      }
    });
    const detalheInfo = document.getElementById('detalhe-info');
    if (detalheInfo) detalheObs.observe(detalheInfo, { childList: true, subtree: true });
  </script>

</body>
</html>
